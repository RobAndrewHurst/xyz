name: Codi unit tests
permissions:
  contents: read

on:
  push:
    branches: ['main', 'major', 'minor', 'patch']
  pull_request:
    branches: ['main', 'major', 'minor', 'patch']

jobs:
  build:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: bun install

      - name: Run tests
        run: node --run test
